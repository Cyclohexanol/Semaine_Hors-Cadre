<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Optimiseur Planning Ateliers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="text-center mb-4">
            <h1 class="mb-1">Optimiseur Planning Ateliers</h1>
            <p class="text-muted">Générez un planning optimisé basé sur les préférences des élèves.</p>
        </header>

        <div id="upload-section">
            <!-- Upload + Launch -->
            <div class="card">
                <!-- Template download banner -->
                <div class="template-banner">
                    <span>Pas encore de fichier ?</span>
                    <a href="{{ url_for('download_template') }}">Télécharger le modèle Excel</a>
                </div>

                <div class="card-body">
                    <form id="upload-form" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="file" class="form-label fw-semibold">Fichier Template rempli</label>
                            <input class="form-control" type="file" id="file" name="file" accept=".xlsx" required>
                            <div id="file-label" class="form-text"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Variété des ateliers
                                <small class="text-muted d-block fw-normal">Encourage chaque élève à découvrir des catégories différentes. Laissez désactivé pour prioriser uniquement les préférences.</small>
                            </label>
                            <div class="segmented-control">
                                <input type="radio" name="category_weight" id="cw0" value="0" checked>
                                <label for="cw0">Désactivé</label>
                                <input type="radio" name="category_weight" id="cw5" value="5">
                                <label for="cw5">Léger</label>
                                <input type="radio" name="category_weight" id="cw10" value="10">
                                <label for="cw10">Modéré</label>
                                <input type="radio" name="category_weight" id="cw15" value="15">
                                <label for="cw15">Fort</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Lancer l'Optimisation
                        </button>
                    </form>

                    <div id="progress-area" class="progress-area" role="status" aria-live="polite">
                        <div id="progress-steps"></div>
                        <div class="progress-bar-track">
                            <div id="progress-bar-fill" class="progress-bar-fill"></div>
                        </div>
                        <div class="elapsed-time">Temps écoulé : <span id="elapsed">0s</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results (populated dynamically by JS) -->
        <div id="results-section" class="results-section"></div>

        <footer class="text-center">
            <p class="mb-1">Optimiseur v2.0</p>
            <p class="mb-1">Développé par <a href="https://github.com/Cyclohexanol" target="_blank" class="text-decoration-none">Ambroise Mean</a> &copy; 2026</p>
            <p>
                <a href="https://github.com/Cyclohexanol/Semaine_Hors-Cadre" target="_blank" class="text-decoration-none">
                    Code source
                </a>
            </p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
